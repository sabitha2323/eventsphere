name: EventSphere Multi-Suite QA Automation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  execute-qa-suites:
    name: Run 1,500 QA Tests (5 Separate 300-Test Suites)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Export Static Expo Web Bundle
        run: npx expo export --platform web

      - name: Start Web Server & Wait for Port 8081
        run: |
          npx serve -s dist -p 8081 &
          npx wait-on http://localhost:8081 --timeout 30000

      - name: 1. Run 300 Selenium E2E Web Tests
        env:
          BASE_URL: http://localhost:8081
        run: node tests/run_selenium_300.js

      - name: 2. Run 300 Appium Mobile E2E Tests
        run: node tests/run_appium_300.js

      - name: 3. Run 300 k6 Load & Stress Tests
        env:
          BASE_URL: http://localhost:8081
        run: node tests/run_k6_load_300.js

      - name: 4. Run 300 Security & SAST Analysis Tests
        run: node tests/run_security_300.js

      - name: 5. Run 300 Vulnerability & Dependency Audit Tests
        run: node tests/run_vulnerability_300.js

      - name: Generate Master 1,500 Test Case Excel Workbook
        run: node tests/generate_master_1500.js

      - name: Upload All Excel Reports & Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EventSphere-1500-QA-Excel-Reports
          path: |
            reports/*.xlsx
            reports/*.csv
            *.xlsx
