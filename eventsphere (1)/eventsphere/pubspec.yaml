name: eventsphere
description: Smart Wedding Hall & Event Venue Booking Platform for Tamil Nadu and Karnataka
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.1

  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0
  lottie: ^2.7.0
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^4.2.1
  fl_chart: ^0.66.2
  table_calendar: ^3.0.9
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  animated_bottom_navigation_bar: ^1.3.3
  expandable: ^5.0.1
  dotted_border: ^2.1.0

  # Maps
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # QR Code
  qr_flutter: ^4.1.0
  qr_code_scanner: ^1.0.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.2.2
  image_picker: ^1.0.7
  url_launcher: ^6.2.3
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  pdf: ^3.10.7
  printing: ^5.12.0
  flutter_local_notifications: ^16.3.2
  permission_handler: ^11.2.0
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  logger: ^2.0.2+1
  equatable: ^2.0.5
  dartz: ^0.10.1

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
